services:
  python_rag:
    build:
      context: .
      dockerfile: python_rag/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PYTHON_RAG_URL: http://python_rag:8000
      PORT: 5000
    depends_on:
      python_rag:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_PROXY_TARGET: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dotnet_worker:
    build:
      context: .
      dockerfile: dotnet_worker/Dockerfile
    env_file:
      - .env
    environment:
      PoliciesPath: /app/data/policies
      PythonRag__BaseUrl: http://python_rag:8000
    depends_on:
      python_rag:
        condition: service_healthy
    volumes:
      - ./data:/app/data
