services:
  python_rag:
    build:
      context: .
      dockerfile: python_rag/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PYTHON_RAG_URL: http://python_rag:8000
      PORT: 5000
    depends_on:
      - python_rag
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_PROXY_TARGET: http://backend:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  dotnet_worker:
    build:
      context: .
      dockerfile: dotnet_worker/Dockerfile
    env_file:
      - .env
    environment:
      PoliciesPath: /app/data/policies
      PythonRag__BaseUrl: http://python_rag:8000
    depends_on:
      - python_rag
    volumes:
      - ./data:/app/data
