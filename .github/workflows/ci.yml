name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: python_rag/requirements.txt

      - name: Install dependencies
        run: pip install -r python_rag/requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q python_rag

      - name: Run Python tests
        run: python -m unittest discover -s python_rag/tests -p "test_*.py"

  backend-tests:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript build
        working-directory: backend
        run: npm run build

      - name: Run tests
        working-directory: backend
        run: npm test

  frontend-tests:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Production build
        working-directory: frontend
        run: npm run build

  dotnet-worker:
    name: .NET worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: dotnet_worker/Worker.csproj

      - name: Restore and build
        working-directory: dotnet_worker
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file for validation
        run: cp .env.example .env

      - name: Validate compose configuration
        run: docker compose -f docker-compose.yml config > /dev/null

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env file for build
        run: cp .env.example .env

      - name: Build all service images
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: docker compose -f docker-compose.yml build
